<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能药品数据管理系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js "></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 15.44px;
        }

        /* 顶部工具栏 */
        .ribbon {
            background: #fff;
            border-bottom: 1px solid #d4d4d4;
            padding: 9.5px 14.26px;
            display: flex;
            gap: 14.26px;
            align-items: center;
            box-shadow: 0 2.38px 4.75px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .ribbon-group {
            display: flex;
            gap: 7.13px;
            padding-right: 14.26px;
            border-right: 1px solid #e0e0e0;
            align-items: center;
        }

        .ribbon-group:last-child {
            border-right: none;
        }

        .btn {
            padding: 7.13px 16.63px;
            border: 1px solid #d4d4d4;
            background: #fff;
            border-radius: 4.75px;
            cursor: pointer;
            font-size: 15.44px;
            display: flex;
            align-items: center;
            gap: 7.13px;
            transition: all 0.2s;
            color: #333;
            height: 38px;
        }

        .btn:hover {
            background: #f0f0f0;
            border-color: #b4b4b4;
        }

        .btn-primary {
            background: #217346;
            color: white;
            border-color: #217346;
        }

        .btn-primary:hover {
            background: #1e623d;
        }

        .btn-warning {
            background: #ff6b6b;
            color: white;
            border-color: #ff5252;
        }

        .btn-warning:hover {
            background: #ff5252;
        }

        .btn-active {
            background: #84cc16 !important;
            color: white !important;
            border-color: #65a30d !important;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 新增：筛选重复项按钮样式 */
        .btn-filter-duplicate {
            background: #9333ea;
            color: white;
            border-color: #7c3aed;
            font-size: 13px;
            padding: 7.13px 12px;
        }

        .btn-filter-duplicate:hover {
            background: #7c3aed;
        }

        .btn-filter-duplicate.active {
            background: #c084fc;
            border-color: #a855f7;
        }

        /* 导入文件名显示样式 - 增加宽度避免被遮挡 */
        .import-filename {
            font-size: 13px;
            color: #666;
            max-width: 250px; /* 从150px增加到250px */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 10px;
            border-left: 1px solid #e0e0e0;
            margin-left: 5px;
        }

        #searchInput {
            width: 356px;
            padding: 0 14.26px;
            border: 1px solid #d4d4d4;
            border-radius: 4.75px;
            font-size: 15.44px;
            height: 38px;
            line-height: 38px;
        }

        #searchInput:focus {
            outline: none;
            border-color: #217346;
            box-shadow: 0 0 0 3.56px rgba(33, 115, 70, 0.1);
        }

        /* 表格容器 */
        .spreadsheet-container {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #fff;
            transform-origin: top left;
        }

        /* Excel风格表格 - 修改为auto以支持自动调整 */
        .sheet-table {
            border-collapse: separate;
            border-spacing: 0;
            table-layout: auto; /* 修改：从fixed改为auto，支持自动调整 */
            user-select: none;
            font-size: 15.44px;
            width: auto; /* 添加：让表格根据内容调整总宽度 */
        }

        .sheet-table th,
        .sheet-table td {
            border: 1px solid #d4d4d4;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        /* 行列号样式 - 标题行字体大一号 */
        .sheet-table th {
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            text-align: center;
            position: sticky;
            z-index: 10;
            font-size: 16.63px;
        }

        .sheet-table th.corner {
            background: #f0f0f0;
            z-index: 20;
            top: 0;
            left: 0;
            width: 43.2px;
            min-width: 43.2px;
        }

        .sheet-table th.col-header {
            top: 0;
            min-width: 95.04px;
            height: 24.73px;
            line-height: 24.73px;
            font-size: 16.63px;
            border-bottom: 2px solid #c0c0c0;
            background: #e5f5d7;
            color: #3f6212;
            white-space: nowrap; /* 添加：防止标题换行 */
        }

        /* 序号列 - 字体调小一号（14.63px） */
        .sheet-table th.row-header {
            left: 0;
            width: 43.2px;
            min-width: 43.2px;
            height: 24.73px;
            line-height: 24.73px;
            font-size: 14.63px; /* 修改：从16.63px调小一号 */
            border-right: 2px solid #c0c0c0;
            cursor: pointer;
            background: #f0f9e8;
            color: #4d7c0f;
            text-align: left;
            padding-left: 4.32px;
        }

        .sheet-table th.row-header:hover {
            background: #dcfce7;
        }

        /* 单元格样式 */
        .sheet-table td {
            min-width: 95.04px; /* 修改：只保留min-width，去掉固定width */
            height: 24.73px;
            background: #fff;
            cursor: cell;
            white-space: nowrap; /* 添加：防止内容换行 */
        }

        .cell-content {
            width: 100%;
            height: 100%;
            padding: 2.38px 4.75px;
            font-size: 15.44px;
            line-height: 19.98px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            outline: none;
            border: 2px solid transparent;
            position: relative;
        }

        .cell-content.selected {
            border: 2px solid #217346;
            background: #e8f5e9;
        }

        .cell-content.editing {
            background: #fff;
            border: 2px solid #217346;
            z-index: 100;
            position: relative;
            cursor: text;
            user-select: text;
            white-space: pre;
            overflow: auto;
        }

        /* C-F列保持固定宽度 - 强制不自动调整 */
        td[data-col="C"], th[data-col="C"],
        td[data-col="D"], th[data-col="D"],
        td[data-col="E"], th[data-col="E"],
        td[data-col="F"], th[data-col="F"] {
            width: 64.8px !important; /* C,E列 */
            min-width: 64.8px !important;
            max-width: 64.8px !important;
        }

        td[data-col="D"], th[data-col="D"],
        td[data-col="F"], th[data-col="F"] {
            width: 39.96px !important; /* D,F列 */
            min-width: 39.96px !important;
            max-width: 39.96px !important;
        }

        td[data-col="D"] {
            background: #fcfcec !important;
            cursor: not-allowed !important;
        }

        td.meta-col {
            background: #f9f9f9 !important;
            font-size: 11.88px !important;
            color: #666 !important;
            min-width: 71.28px !important;
        }

        th.meta-col {
            background: #e0e0e0 !important;
            color: #666 !important;
            font-size: 12.96px !important;
            min-width: 71.28px !important;
        }

        /* A列字体小2号（15.44px），B-G列保持大一号（17.44px） */
        td[data-col="A"] .cell-content {
            font-size: 15.44px !important; /* 修改：从17.44px改为15.44px，小2号 */
            line-height: 19.98px !important; /* 相应调整行高 */
        }

        td[data-col="B"] .cell-content,
        td[data-col="C"] .cell-content,
        td[data-col="D"] .cell-content,
        td[data-col="E"] .cell-content,
        td[data-col="F"] .cell-content,
        td[data-col="G"] .cell-content {
            font-size: 17.44px !important;
            line-height: 21.98px !important;
        }

        /* H列及之后（H-AN）内容字体调小一号（14.44px），标题保持16.63px不变 */
        td[data-col="H"] .cell-content,
        td[data-col="I"] .cell-content,
        td[data-col="J"] .cell-content,
        td[data-col="K"] .cell-content,
        td[data-col="L"] .cell-content,
        td[data-col="M"] .cell-content,
        td[data-col="N"] .cell-content,
        td[data-col="O"] .cell-content,
        td[data-col="P"] .cell-content,
        td[data-col="Q"] .cell-content,
        td[data-col="R"] .cell-content,
        td[data-col="S"] .cell-content,
        td[data-col="T"] .cell-content,
        td[data-col="U"] .cell-content,
        td[data-col="V"] .cell-content,
        td[data-col="W"] .cell-content,
        td[data-col="X"] .cell-content,
        td[data-col="Y"] .cell-content,
        td[data-col="Z"] .cell-content,
        td[data-col="AA"] .cell-content,
        td[data-col="AB"] .cell-content,
        td[data-col="AC"] .cell-content,
        td[data-col="AD"] .cell-content,
        td[data-col="AE"] .cell-content,
        td[data-col="AF"] .cell-content,
        td[data-col="AG"] .cell-content,
        td[data-col="AH"] .cell-content,
        td[data-col="AI"] .cell-content,
        td[data-col="AJ"] .cell-content,
        td[data-col="AK"] .cell-content,
        td[data-col="AL"] .cell-content,
        td[data-col="AM"] .cell-content,
        td[data-col="AN"] .cell-content {
            font-size: 14.44px !important;
            line-height: 18.98px !important;
        }

        /* 可编辑标题 */
        th.col-header.editable-header {
            cursor: text;
            background: #f0f9e8;
        }

        th.col-header.editable-header:hover {
            background: #dcfce7;
        }

        th.col-header .header-text {
            pointer-events: none;
        }

        th.col-header.editable-header .header-text {
            pointer-events: auto;
        }

        /* I列链接样式 */
        th[data-col="I"] {
            color: #1976d2 !important;
            text-decoration: underline !important;
            cursor: pointer !important;
        }

        th[data-col="I"]:hover {
            background: #e3f2fd !important;
        }

        /* 标记颜色 - 粉色改为更淡的颜色 */
        .cell-yellow { background-color: #fff200 !important; }
        .cell-red { background-color: #ef5350 !important; color: white !important; }
        .cell-pink { background-color: #fce7f3 !important; } /* 修改：从#f8bbd9改为更淡的#fce7f3 */
        .duplicate-cell { background-color: #ef5350 !important; color: white !important; }
        /* 移除搜索高亮样式 - 不再使用黄色高亮 */
        /* .search-highlight { background-color: #fef08a !important; } */

        /* 行高亮效果 - 淡蓝色背景 */
        tr.row-highlight td {
            background-color: #e3f2fd !important;
        }

        /* 有颜色的单元格跳过高亮 */
        tr.row-highlight td.cell-yellow,
        tr.row-highlight td.cell-red,
        tr.row-highlight td.cell-pink,
        tr.row-highlight td.duplicate-cell {
            background-color: inherit !important;
        }

        /* 序号列高亮 */
        th.row-header.row-highlight {
            background-color: #e3f2fd !important;
        }

        /* 备注指示器 - 改为紫色 */
        .comment-indicator {
            position: absolute;
            top: 1.08px;
            right: 1.08px;
            width: 10.8px;
            height: 10.8px;
            background-color: #9333ea; /* 修改：从#ef5350红色改为#9333ea紫色 */
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        /* 右键菜单 */
        .context-menu {
            position: absolute;
            width: 261.36px;
            background: white;
            border: 1px solid #d4d4d4;
            box-shadow: 0 4.75px 14.26px rgba(0,0,0,0.15);
            border-radius: 4.75px;
            padding: 4.75px 0;
            z-index: 10000;
            display: none;
        }

        .context-menu-item {
            padding: 9.5px 19.01px;
            cursor: pointer;
            font-size: 15.44px;
            display: flex;
            align-items: center;
            gap: 9.5px;
        }

        .context-menu-item:hover {
            background-color: #f0f0f0;
        }

        /* 标粉菜单项特殊样式 - 更新为新的淡粉色 */
        .context-menu-item.pink-item::before {
            content: '';
            display: inline-block;
            width: 17.28px;
            height: 17.28px;
            background-color: #fce7f3; /* 修改：与.cell-pink保持一致 */
            border-radius: 3.89px;
            margin-right: 4.32px;
            border: 1px solid #ddd; /* 添加边框以便在白色背景上可见 */
        }

        .context-menu-separator {
            height: 1px;
            background-color: #e0e0e0;
            margin: 4.75px 0;
        }

        /* 备注弹窗 */
        .comment-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffe1;
            border: 2px solid #999;
            border-radius: 9.5px;
            padding: 23.76px;
            font-size: 16.63px;
            min-width: 356px;
            max-width: 594px;
            box-shadow: 0 9.5px 28.51px rgba(0,0,0,0.3);
            z-index: 10001;
            display: none;
            word-wrap: break-word;
            line-height: 1.6;
            color: #333;
        }

        .comment-popup.show {
            display: block;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .comment-popup-close {
            position: absolute;
            top: 9.5px;
            right: 14.26px;
            cursor: pointer;
            font-size: 23.76px;
            color: #666;
        }

        .comment-popup-close:hover {
            color: #000;
        }

        /* 悬停备注提示 */
        .comment-tooltip {
            position: fixed;
            background: rgba(51, 51, 51, 0.95);
            color: white;
            padding: 8.64px 12.96px;
            border-radius: 4.32px;
            font-size: 14px;
            max-width: 324px;
            word-wrap: break-word;
            z-index: 10002;
            display: none;
            pointer-events: none;
            box-shadow: 0 2.16px 8.64px rgba(0,0,0,0.2);
        }

        .comment-tooltip.show {
            display: block;
        }

        /* 加载遮罩 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 23.76px;
        }

        .loading-spinner {
            width: 59.4px;
            height: 59.4px;
            border: 5.94px solid #f3f3f3;
            border-top: 5.94px solid #217346;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 356px;
            height: 23.76px;
            background: #e0e0e0;
            border-radius: 11.88px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #217346;
            width: 0%;
            transition: width 0.3s;
        }

        /* Toast提示 - 增强版 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(51, 51, 51, 0.95);
            color: white;
            padding: 19.01px 38.02px;
            border-radius: 9.5px;
            font-size: 16.63px;
            z-index: 10001;
            display: none;
            box-shadow: 0 4.75px 14.26px rgba(0,0,0,0.3);
            max-width: 500px;
            text-align: center;
            line-height: 1.5;
        }

        .toast.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        .toast.undo-toast {
            background: rgba(33, 115, 70, 0.95);
            border: 2px solid #4ade80;
        }

        .toast.redo-toast {
            background: rgba(30, 64, 175, 0.95);
            border: 2px solid #60a5fa;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* 遮罩层 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: none;
        }

        .modal-overlay.show {
            display: block;
        }

        /* 隐藏行样式 */
        tr.hidden-row {
            display: none !important;
        }

        /* 滚动条 - 改为绿色 */
        ::-webkit-scrollbar {
            width: 14.26px;
            height: 14.26px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #4ade80; /* 修改：绿色 */
            border-radius: 7.13px;
            border: 3.56px solid #f1f1f1;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #22c55e; /* 修改：深绿色悬停 */
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div id="loadingText">正在处理...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 悬停备注提示 -->
    <div class="comment-tooltip" id="commentTooltip"></div>

    <!-- 遮罩层 -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <!-- 工具栏 -->
    <div class="ribbon">
        <div class="ribbon-group">
            <input type="text" id="searchInput" placeholder="搜索条码或药品名称(A/B列)...">
            <button class="btn" id="clearSearchBtn">清空搜索</button>
            <button class="btn" id="filterToggle">筛选＞0</button>
            <!-- 已移除自适应列宽按钮 -->
        </div>

        <div class="ribbon-group">
            <label class="btn btn-primary">
                <span>📂 打开</span>
                <input type="file" id="fileInput" accept=".xlsx,.xlsm" style="display: none;">
            </label>
            <button class="btn btn-warning" id="saveBtn">💾 保存</button>
        </div>

        <div class="ribbon-group">
            <!-- 修改：新增药品（原新增行） -->
            <button class="btn" id="addRowBtn">➕ 新增药品</button>
            <button class="btn" id="undoBtn" disabled>↩️ 返回上一步</button>
            <button class="btn" id="redoBtn" disabled>↪️ 恢复下一步</button>
            <!-- 新增：导入文件名显示 -->
            <span class="import-filename" id="importFilename" title=""></span>
            <!-- 新增：筛选重复项按钮 -->
            <button class="btn btn-filter-duplicate" id="filterDuplicateBtn" title="显示所有重复项">🔍 重复项</button>
        </div>

        <div style="flex: 1;"></div>
    </div>

    <!-- 表格区域 -->
    <div class="spreadsheet-container" id="container">
        <table class="sheet-table" id="sheetTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="addComment()">📝 添加/编辑备注</div>
        <div class="context-menu-item" onclick="clearComment()">🗑️ 清除备注</div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" onclick="formatCell('red')">🟥 红色（有问题）</div>
        <div class="context-menu-item" onclick="formatCell('yellow')">🟨 标黄（补药）</div>
        <div class="context-menu-item pink-item" onclick="formatCell('pink')">标粉（妇科）</div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" onclick="clearCellFormat()">⬜ 清除颜色</div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" onclick="deleteSelectedRow()">🗑️ 删除整行</div>
        <div class="context-menu-item" onclick="clearSelectedCells()">⌫ 清空内容</div>
    </div>

    <!-- 备注弹窗 -->
    <div class="comment-popup" id="commentPopup">
        <span class="comment-popup-close" onclick="closeCommentPopup()">×</span>
        <div id="commentPopupContent"></div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            maxCol: 'AN',
            dataMaxCol: 'T',
            readOnlyCol: ['D'],
            calcHeaderCol: 'L',
            editableHeaders: ['H', 'I', 'J', 'K'],
            formulaHeaders: ['J', 'K'],
            traceCodeCol: ['H','I','M','N'],
            countColForD: [],
            noMetaCols: ['C', 'D', 'E', 'F', 'G'],
            noResizeCols: ['C', 'D', 'E', 'F'], // C-F列不自动调整
            storageKey: 'medicine_excel_data_v2_7',
            metaDataSeparator: '|',
            batchSize: 50,
            maxHistory: 20,
            debounceDelay: 300,
            importChunkSize: 100,
            searchJumpStartCol: 'H',
            minColWidth: 50, // 最小列宽
            maxColWidth: 400, // 最大列宽

        function generateColLetters() {
            const letters = [];
            for (let i = 0; i < 26; i++) letters.push(String.fromCharCode(65 + i));
            for (let i = 0; i < 14; i++) letters.push('A' + String.fromCharCode(65 + i));
            return letters;
        }

        document.addEventListener('DOMContentLoaded', () => {
            state.colLetters = generateColLetters();
            initTable();
            initEvents();
            initSampleData();
            loadFromLocalStorage();
            // 初始化后自动调整一次列宽
            setTimeout(() => autoResizeColumns(), 100);
            saveToHistory('初始化', null);
            
            // 新增：启动自动保存定时器
            initAutoSave();
        });

        // ==================== 新增：自动保存功能 ====================
        function initAutoSave() {
            // 清除现有定时器
            if (state.autoSaveTimer) {
                clearInterval(state.autoSaveTimer);
            }
            
            // 计算到下一个10点半的时间
            function getNextSaveTime() {
                const now = new Date();
                const target = new Date();
                target.setHours(CONFIG.autoSaveHour, CONFIG.autoSaveMinute, 0, 0);
                
                // 如果今天的时间已过，设置为明天
                if (target <= now) {
                    target.setDate(target.getDate() + 1);
                }
                
                return target - now;
            }
            
            // 设置首次定时
            const firstDelay = getNextSaveTime();
            
            setTimeout(() => {
                performAutoSave();
                // 之后每24小时执行一次
                state.autoSaveTimer = setInterval(performAutoSave, 24 * 60 * 60 * 1000);
            }, firstDelay);
            
            console.log(`自动保存已设置，将在 ${new Date(Date.now() + firstDelay).toLocaleString()} 首次执行`);
        }

        function performAutoSave() {
            // 检查是否有数据需要保存
            let hasData = false;
            for (let r = 1; r <= state.rows; r++) {
                for (let c = 0; c < state.colLetters.length; c++) {
                    const col = state.colLetters[c];
                    const cellId = `${col}${r}`;
                    if (state.data[cellId] && state.data[cellId].trim() !== '') {
                        hasData = true;
                        break;
                    }
                }
                if (hasData) break;
            }
            
            if (!hasData) {
                console.log('自动保存：无数据，跳过');
                return;
            }
            
            try {
                const data = [];
                const header = state.colLetters.map(col => state.headerData[col] || col);
                data.push(header);
                for (let r = 1; r <= state.rows; r++) {
                    const row = [];
                    let hasRowData = false;
                    state.colLetters.forEach(col => {
                        const val = state.data[`${col}${r}`] || '';
                        row.push(val);
                        if (val) hasRowData = true;
                    });
                    if (hasRowData) data.push(row);
                }
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '药品数据');
                
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const filename = `yb数据${year}${month}${day} ${hours}${minutes}_自动保存.xlsx`;
                
                XLSX.writeFile(wb, filename);
                
                // 记录到历史
                saveToHistory(ACTION_TYPES.AUTO_SAVE, { 
                    fileName: filename,
                    rowCount: data.length - 1,
                    timestamp: now.toISOString()
                });
                
                showToast(`🕐 自动保存成功：${filename}`);
                console.log(`自动保存完成：${filename}`);
            } catch (err) {
                console.error('自动保存失败:', err);
                showToast('自动保存失败: ' + err.message);
            }
        }

        function initTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            // 修改：G列标题改为"备注（不放追溯码）"
            const headerText = {
                A: '条码', B: '药品名称', C: '价', D: '无空', E: 'hyj', F: '上限', G: '备注（不放码',
                H: 'Q02000000', I: '点击访问网站', J: '240', K: '126.8', L: '计算值',
                M: '', N: '', O: '', P: '', Q: '', R: '', S: '', T: '',
                U: 'A元', V: 'B元', W: 'C元', X: 'D元', Y: 'E元', Z: 'F元',
                AA: 'G元', AB: 'H元', AC: 'I元', AD: 'J元', AE: 'K元', AF: 'L元',
                AG: 'M元', AH: 'N元', AI: 'O元', AJ: 'P元', AK: 'Q元', AL: 'R元',
                AM: 'S元', AN: 'T元'
            };

            state.colLetters.forEach(col => {
                state.headerData[col] = headerText[col] || col;
            });

            let headerHTML = '<tr><th class="corner"></th>';
            state.colLetters.forEach((col, idx) => {
                const isMeta = idx >= 20;
                const isEditable = CONFIG.editableHeaders.includes(col);
                const isI = col === 'I';
                const text = state.headerData[col];
                let width = getColWidth(col, idx);
                const classes = ['col-header'];
                if (isMeta) classes.push('meta-col');
                if (isEditable || isI) classes.push('editable-header');
                const clickHandler = isI ? 'onclick="openWebsite()"' : 
                                   (isEditable ? 'onclick="editHeader(\'' + col + '\')"' : '');
                // 添加列标题属性用于自动调整
                headerHTML += `<th class="${classes.join(' ')}" data-col="${col}" data-idx="${idx}" style="min-width: ${width}px;" ${clickHandler}>
                    <span class="header-text">${text}</span>
                </th>`;
            });
            headerHTML += '</tr>';
            thead.innerHTML = headerHTML;
            renderEmptyRows();
            calculateLHeader();
        }

        function getColWidth(col, idx) {
            if (col === 'A') return 145.8;
            if (col === 'C' || col === 'E') return 64.8;
            if (col === 'D' || col === 'F') return 39.96;
            if (idx >= 7 && idx <= 19) return 173.88;
            if (idx >= 20) return 71.28;
            return 118.8;
        }

        function renderEmptyRows() {
            const tbody = document.getElementById('tableBody');
            let bodyHTML = '';
            for (let r = 0; r < state.rows; r++) {
                bodyHTML += `<tr data-row-num="${r + 1}"><th class="row-header" onclick="selectRow(${r})">${r + 1}</th>`;
                state.colLetters.forEach((col, idx) => {
                    const isMeta = idx >= 20;
                    const isReadOnly = CONFIG.readOnlyCol.includes(col);
                    const cellId = `${col}${r + 1}`;
                    // C-F列使用固定宽度，其他列使用min-width支持自动调整
                    const isFixed = CONFIG.noResizeCols.includes(col);
                    const width = getColWidth(col, idx);
                    const widthStyle = isFixed ? `width: ${width}px; min-width: ${width}px; max-width: ${width}px;` : `min-width: ${width}px;`;
                    
                    bodyHTML += `
                        <td data-row="${r}" data-col="${col}" data-id="${cellId}" 
                            class="${isMeta ? 'meta-col' : ''} ${isReadOnly ? '' : 'editable'}"
                            style="${widthStyle}"
                            onclick="handleCellClick(event, '${cellId}')"
                            onmouseenter="highlightRow(${r}); showCommentTooltip(event, '${cellId}')"
                            onmouseleave="clearHighlight(); hideCommentTooltip()">
                            <div class="cell-content" id="cell-${cellId}"></div>
                        </td>
                    `;
                });
                bodyHTML += '</tr>';
            }
            tbody.innerHTML = bodyHTML;
        }

        // ==================== 自动调整列宽功能（自动执行，无需按钮） ====================
        function autoResizeColumns() {
            // 创建临时canvas用于测量文本宽度
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            // 设置字体以匹配单元格样式
            context.font = '15.44px "Microsoft YaHei", "Segoe UI", Arial, sans-serif';
            
            const headerContext = canvas.getContext('2d');
            headerContext.font = 'bold 16.63px "Microsoft YaHei", "Segoe UI", Arial, sans-serif';
            
            // 为每个列计算最大宽度
            state.colLetters.forEach((col, idx) => {
                // 跳过C-F列（固定宽度）
                if (CONFIG.noResizeCols.includes(col)) return;
                
                let maxWidth = getColWidth(col, idx); // 默认最小宽度
                const isMeta = idx >= 20;
                // A列使用15.44px字体测量，B-G列使用17.44px
                let fontSize;
                if (col === 'A') {
                    fontSize = 15.44;
                } else if (['B','C','D','E','F','G'].includes(col)) {
                    fontSize = 17.44;
                } else {
                    fontSize = isMeta ? 11.88 : 15.44;
                }
                context.font = `${fontSize}px "Microsoft YaHei", "Segoe UI", Arial, sans-serif`;
                
                // 1. 测量标题宽度
                const headerText = state.headerData[col] || col;
                const headerWidth = headerContext.measureText(headerText).width;
                maxWidth = Math.max(maxWidth, headerWidth + 20); // 加padding
                
                // 2. 测量该列所有单元格内容宽度
                for (let r = 1; r <= state.rows; r++) {
                    const cellId = `${col}${r}`;
                    const value = state.data[cellId] || '';
                    if (value) {
                        const textWidth = context.measureText(value).width;
                        maxWidth = Math.max(maxWidth, textWidth + 20); // 加padding
                    }
                }
                
                // 3. 应用最大/最小限制
                maxWidth = Math.max(CONFIG.minColWidth, Math.min(maxWidth, CONFIG.maxColWidth));
                
                // 4. 应用宽度到表格
                const th = document.querySelector(`th[data-col="${col}"]`);
                const tds = document.querySelectorAll(`td[data-col="${col}"]`);
                
                if (th) {
                    th.style.width = maxWidth + 'px';
                    th.style.minWidth = maxWidth + 'px';
                }
                tds.forEach(td => {
                    td.style.width = maxWidth + 'px';
                    td.style.minWidth = maxWidth + 'px';
                });
                
                state.colWidths[col] = maxWidth;
            });
            
            showToast('列宽已自动调整');
        }

        // 调整单列宽度
        function resizeSingleColumn(col) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const idx = state.colLetters.indexOf(col);
            const isMeta = idx >= 20;
            // A列使用15.44px字体测量
            let fontSize;
            if (col === 'A') {
                fontSize = 15.44;
            } else if (['B','C','D','E','F','G'].includes(col)) {
                fontSize = 17.44;
            } else {
                fontSize = isMeta ? 11.88 : 15.44;
            }
            context.font = `${fontSize}px "Microsoft YaHei", "Segoe UI", Arial, sans-serif`;
            
            let maxWidth = getColWidth(col, idx);
            
            // 测量标题
            const headerText = state.headerData[col] || col;
            const headerWidth = context.measureText(headerText).width;
            maxWidth = Math.max(maxWidth, headerWidth + 20);
            
            // 测量内容
            for (let r = 1; r <= state.rows; r++) {
                const cellId = `${col}${r}`;
                const value = state.data[cellId] || '';
                if (value) {
                    const textWidth = context.measureText(value).width;
                    maxWidth = Math.max(maxWidth, textWidth + 20);
                }
            }
            
            maxWidth = Math.max(CONFIG.minColWidth, Math.min(maxWidth, CONFIG.maxColWidth));
            
            const th = document.querySelector(`th[data-col="${col}"]`);
            const tds = document.querySelectorAll(`td[data-col="${col}"]`);
            
            if (th) {
                th.style.width = maxWidth + 'px';
                th.style.minWidth = maxWidth + 'px';
            }
            tds.forEach(td => {
                td.style.width = maxWidth + 'px';
                td.style.minWidth = maxWidth + 'px';
            });
            
            state.colWidths[col] = maxWidth;
        }

        function highlightRow(rowIdx) {
            clearHighlight();
            state.highlightedRow = rowIdx;
            const row = document.querySelectorAll('#tableBody tr')[rowIdx];
            if (!row || row.classList.contains('hidden-row')) return;
            row.classList.add('row-highlight');
            const rowHeader = row.querySelector('.row-header');
            if (rowHeader) rowHeader.classList.add('row-highlight');
        }

        function clearHighlight() {
            document.querySelectorAll('.row-highlight').forEach(el => {
                el.classList.remove('row-highlight');
            });
            state.highlightedRow = null;
        }

        function editHeader(col) {
            if (state.editingHeader) return;
            const th = document.querySelector(`th[data-col="${col}"]`);
            const currentText = state.headerData[col];
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentText;
            input.style.cssText = 'width: 100%; height: 100%; border: none; outline: 2px solid #217346; padding: 2px; font-size: 14px; font-weight: bold; text-align: center;';
            const span = th.querySelector('.header-text');
            span.style.display = 'none';
            th.appendChild(input);
            input.focus();
            input.select();
            state.editingHeader = col;
            const finishEdit = () => {
                const newValue = input.value.trim();
                if (newValue && newValue !== currentText) {
                    const oldValue = state.headerData[col];
                    state.headerData[col] = newValue;
                    span.textContent = newValue;
                    if (CONFIG.formulaHeaders.includes(col)) {
                        calculateLHeader();
                    }
                    // 标题修改后自动调整该列宽度
                    if (!CONFIG.noResizeCols.includes(col)) {
                        setTimeout(() => resizeSingleColumn(col), 0);
                    }
                    saveToHistory(ACTION_TYPES.EDIT_HEADER, { col, oldValue, newValue, cellId: `header-${col}` });
                } else {
                    span.textContent = currentText;
                }
                input.remove();
                span.style.display = '';
                state.editingHeader = null;
            };
            input.addEventListener('blur', finishEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    finishEdit();
                } else if (e.key === 'Escape') {
                    input.remove();
                    span.style.display = '';
                    state.editingHeader = null;
                }
            });
        }

        function calculateLHeader() {
            const jVal = parseFloat(state.headerData['J']) || 0;
            const kVal = parseFloat(state.headerData['K']) || 0;
            const lVal = (jVal - kVal).toFixed(1);
            state.headerData['L'] = lVal;
            const thL = document.querySelector(`th[data-col="L"] .header-text`);
            if (thL) thL.textContent = lVal;
        }

            window.open('https://www.mashangfangxin.com/ ', '_blank', 'noopener,noreferrer');
        }
